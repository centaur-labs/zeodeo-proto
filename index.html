<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeodeo — Landing Page Prototypes</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    max-width: 640px;
    margin: 60px auto;
    padding: 0 20px;
    color: #1a1a1a;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  p.subtitle {
    color: #666;
    margin-top: 0;
    margin-bottom: 32px;
  }
  ul {
    list-style: none;
    padding: 0;
  }
  li {
    margin-bottom: 12px;
  }
  a {
    display: block;
    padding: 14px 18px;
    border: 1px solid #ddd;
    border-radius: 8px;
    text-decoration: none;
    color: #1a1a1a;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  a:hover {
    border-color: #999;
    background: #fafafa;
  }
  .soon {
    padding: 14px 18px;
    border: 1px dashed #ddd;
    border-radius: 8px;
    color: #aaa;
  }
  .region {
    font-size: 0.85rem;
    color: #888;
    margin-left: 8px;
  }
</style>
</head>
<body>
  <h1>Zeodeo — Landing Page Prototypes</h1>
  <p class="subtitle">Prototype pages by product and region.</p>
  <ul>
    <li><a href="litter-tray/">Litter Tray <span class="region">UK</span></a></li>
    <li><span class="soon">Litter Box <span class="region">EU</span> — coming soon</span></li>
    <li><span class="soon">Aroma Granules <span class="region">UK</span> — coming soon</span></li>
    <li><span class="soon">Aroma Granules <span class="region">EU</span> — coming soon</span></li>
  </ul>
</body>
</html>
